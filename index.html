<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Gas Rumah Kaca</title>
    <style>
        /* Pengaturan latar belakang halaman */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a1a;
        }

        /* Container Utama Simulasi */
        #simulasi-container {
            position: relative;
            width: 512px;
            height: 288px;
            overflow: hidden; 
        }

        /* Mengatur semua gambar agar menumpuk rapi dan tidak mengganggu klik */
        #simulasi-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Class untuk semua area klik transparan */
        .hitbox {
            position: absolute;
            cursor: pointer;
            /* border: 1px solid red; background: rgba(255,0,0,0.2); /* Buka komentar ini jika ingin melihat letak kotak klik */
        }

        /* --- HITBOX KANVAS UTAMA --- */
        .hitbox-utama { width: 32px; height: 32px; z-index: 4; }
        
        #btn-soo     { left: 160px; top: 96px; }  /* f4 */
        #btn-coo     { left: 192px; top: 32px; }  /* g2 */
        #btn-noo     { left: 256px; top: 64px; }  /* i3 */
        #btn-chhhh   { left: 320px; top: 0px; }   /* k1 */
        #btn-co      { left: 384px; top: 32px; }  /* m2 */
        #btn-cclclff { left: 448px; top: 64px; }  /* o3 */


        /* --- LAYER OVERLAY GELAP --- */
        #popup-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5); /* Hitam dengan Opacity 50% */
            display: none; /* Tersembunyi di awal */
            z-index: 5; /* Berada di atas kanvas utama, tapi di bawah pop-up */
        }

        /* --- LAYER POP-UP --- */
        #popup-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 512px;
            height: 288px;
            display: none; /* Tersembunyi di awal */
            z-index: 10; /* Berada paling atas */
        }

        /* --- HITBOX POP-UP --- */
        #btn-tutup  { left: 480px; top: 0px; width: 32px; height: 32px; }   /* p1 */
        #btn-gabung { left: 32px; top: 64px; width: 96px; height: 32px; }   /* b3;c3;d3 */
        #btn-pisah  { left: 32px; top: 96px; width: 96px; height: 32px; }   /* b4;c4;d4 */

    </style>
</head>
<body>

    <div id="simulasi-container">
        <img src="kanvassmm.png" alt="Kanvas Dasar">
        <img src="smmdeco1.gif" alt="Awan dan Trafik">
        <img src="smmdeco2.gif" alt="Bus">
        <img src="smmmol.gif" alt="Molekul">

        <div id="btn-soo" class="hitbox hitbox-utama" onclick="bukaPopUp('soo')" title="Belerang dioksida"></div>
        <div id="btn-coo" class="hitbox hitbox-utama" onclick="bukaPopUp('coo')" title="Karbon dioksida"></div>
        <div id="btn-noo" class="hitbox hitbox-utama" onclick="bukaPopUp('noo')" title="Nitrogen dioksida"></div>
        <div id="btn-chhhh" class="hitbox hitbox-utama" onclick="bukaPopUp('chhhh')" title="Metana"></div>
        <div id="btn-co" class="hitbox hitbox-utama" onclick="bukaPopUp('co')" title="Karbon monoksida"></div>
        <div id="btn-cclclff" class="hitbox hitbox-utama" onclick="bukaPopUp('cclclff')" title="Freon - 12"></div>

        <div id="popup-overlay" onclick="tutupPopUp()"></div>

        <div id="popup-container">
            <img id="popup-bg" src="" alt="Latar Informasi">
            <img id="popup-anim" src="" alt="Animasi Molekul">

            <div id="btn-tutup" class="hitbox" onclick="tutupPopUp()" title="Tutup"></div>
            <div id="btn-gabung" class="hitbox" onclick="aksiGabung()" title="Gabungkan"></div>
            <div id="btn-pisah" class="hitbox" onclick="aksiPisah()" title="Pisahkan"></div>
        </div>
    </div>

    <script>
        // --- PRELOADER SUPER ROBUST ---
        // Memaksa browser mengunduh semua aset ke memori sebelum dimainkan
        // untuk memastikan tidak ada kedipan atau transisi lambat.
        const asetPreload = [];
        window.onload = function() {
            const listSenyawa = ['soo', 'coo', 'noo', 'chhhh', 'co', 'cclclff'];
            const ekstensi = ['info.png', 'c.gif', 'c1.gif', 'd.gif', 'd1.gif'];
            
            listSenyawa.forEach(senyawa => {
                ekstensi.forEach(eks => {
                    const img = new Image();
                    img.src = `smm${senyawa}${eks}`;
                    asetPreload.push(img);
                });
            });
        };

        // --- VARIABEL GLOBAL ---
        let molekulAktif = ''; 
        let timerAnimasiPopUp; 
        let sedangAnimasi = false; // Mencegah klik beruntun (spam klik) yang merusak transisi
        
        const popupContainer = document.getElementById('popup-container');
        const popupOverlay = document.getElementById('popup-overlay');
        const popupBg = document.getElementById('popup-bg');
        const popupAnim = document.getElementById('popup-anim');

        // --- FUNGSI BUKA / TUTUP POP-UP ---
        function bukaPopUp(kodeSenyawa) {
            molekulAktif = kodeSenyawa;
            sedangAnimasi = false;
            clearTimeout(timerAnimasiPopUp);
            
            // Keadaan default saat pop-up dibuka: molekul terpisah (d.gif)
            popupBg.src = `smm${kodeSenyawa}info.png`;
            popupAnim.src = `smm${kodeSenyawa}d.gif`;
            
            // Tampilkan overlay gelap dan pop-up
            popupOverlay.style.display = 'block';
            popupContainer.style.display = 'block';
        }

        function tutupPopUp() {
            popupOverlay.style.display = 'none';
            popupContainer.style.display = 'none';
            molekulAktif = '';
            sedangAnimasi = false;
            clearTimeout(timerAnimasiPopUp);
            // Mengosongkan gambar agar tidak membekas saat pop-up lain dibuka
            popupBg.src = '';
            popupAnim.src = ''; 
        }

        // --- FUNGSI TOMBOL POP-UP ---
        function aksiGabung() {
            if (molekulAktif === '' || sedangAnimasi) return;
            sedangAnimasi = true;
            clearTimeout(timerAnimasiPopUp);

            // Putar animasi transisi penyatuan (...d1.gif)
            popupAnim.src = `smm${molekulAktif}d1.gif`;

            // Potong 50ms (0,05 detik) lebih awal dari durasi asli 1000ms
            // agar GIF tidak sempat mengulang (loop) yang menyebabkan kedipan.
            timerAnimasiPopUp = setTimeout(() => {
                popupAnim.src = `smm${molekulAktif}c.gif`;
                sedangAnimasi = false;
            }, 950); 
        }

        function aksiPisah() {
            if (molekulAktif === '' || sedangAnimasi) return;
            sedangAnimasi = true;
            clearTimeout(timerAnimasiPopUp);

            // Putar animasi transisi pemisahan (...c1.gif)
            popupAnim.src = `smm${molekulAktif}c1.gif`;

            timerAnimasiPopUp = setTimeout(() => {
                popupAnim.src = `smm${molekulAktif}d.gif`;
                sedangAnimasi = false;
            }, 950);
        }
    </script>

</body>
</html>
