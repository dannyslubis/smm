<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulasi Gas Rumah Kaca - Autoscaling</title>
    <style>
        /* 1. ATURAN WAJIB: Body menggunakan 100svh agar tidak terpotong UI Browser Mobile */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100svh;
            width: 100vw;
            background-color: #1a1a1a;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            font-family: 'VT323', monospace;
        }

        /* 2 & 3. ATURAN WAJIB: Container 16:9 dengan Dynamic Scaling */
        #simulasi-container {
            position: relative;
            width: 100%;
            /* Menggunakan aspect-ratio agar proporsi tetap 16:9 */
            aspect-ratio: 16 / 9;
            /* Kalkulasi agar ukuran mentok sebelum keluar batas layar */
            max-width: calc(100svh * (16 / 9));
            max-height: calc(100vw * (9 / 16));
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Mengatur semua layer gambar agar responsif 100% */
        #simulasi-container img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            image-rendering: pixelated; /* Menjaga estetika pixel art tetap tajam */
        }

        /* Area klik transparan menggunakan persentase agar ikut scaling */
        .hitbox {
            position: absolute;
            cursor: pointer;
            z-index: 10;
        }

        /* --- KOORDINAT KANVAS UTAMA (%) --- */
        /* Perhitungan: (Pixel / 512 atau 288) * 100 */
        #btn-soo     { left: 31.25%; top: 33.33%; width: 6.25%; height: 11.11%; } /* f4 */
        #btn-coo     { left: 37.50%; top: 11.11%; width: 6.25%; height: 11.11%; } /* g2 */
        #btn-noo     { left: 50.00%; top: 22.22%; width: 6.25%; height: 11.11%; } /* i3 */
        #btn-chhhh   { left: 62.50%; top: 00.00%; width: 6.25%; height: 11.11%; } /* k1 */
        #btn-co      { left: 75.00%; top: 11.11%; width: 6.25%; height: 11.11%; } /* m2 */
        #btn-cclclff { left: 87.50%; top: 22.22%; width: 6.25%; height: 11.11%; } /* o3 */

        /* --- POP-UP SYSTEM --- */
        #popup-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.75);
            display: none;
            z-index: 20;
        }

        #popup-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 30;
        }

        /* --- TOMBOL POP-UP (%) --- */
        #btn-tutup  { left: 93.75%; top: 00.00%; width: 6.25%; height: 11.11%; } /* p1 */
        #btn-gabung { left: 06.25%; top: 22.22%; width: 18.75%; height: 11.11%; } /* b3-d3 */
        #btn-pisah  { left: 06.25%; top: 33.33%; width: 18.75%; height: 11.11%; } /* b4-d4 */

    </style>
</head>
<body>

    <div id="simulasi-container">
        <img src="kanvassmm.png" alt="Dasar">
        <img src="smmdeco1.gif" alt="Dekorasi1">
        <img src="smmdeco2.gif" alt="Dekorasi2">
        <img src="smmmol.gif" alt="Molekul">

        <div id="btn-soo" class="hitbox" onclick="bukaPopUp('soo')"></div>
        <div id="btn-coo" class="hitbox" onclick="bukaPopUp('coo')"></div>
        <div id="btn-noo" class="hitbox" onclick="bukaPopUp('noo')"></div>
        <div id="btn-chhhh" class="hitbox" onclick="bukaPopUp('chhhh')"></div>
        <div id="btn-co" class="hitbox" onclick="bukaPopUp('co')"></div>
        <div id="btn-cclclff" class="hitbox" onclick="bukaPopUp('cclclff')"></div>

        <div id="popup-overlay" onclick="tutupPopUp()"></div>
        <div id="popup-container">
            <img id="popup-bg" src="">
            <img id="popup-anim" src="">
            
            <div id="btn-tutup" class="hitbox" onclick="tutupPopUp()"></div>
            <div id="btn-gabung" class="hitbox" onclick="aksiGabung()"></div>
            <div id="btn-pisah" class="hitbox" onclick="aksiPisah()"></div>
        </div>
    </div>

    <script>
        // Preloading Aset untuk kelancaran transisi
        const asetPreload = [];
        window.onload = function() {
            const listSenyawa = ['soo', 'coo', 'noo', 'chhhh', 'co', 'cclclff'];
            const ekstensi = ['info.png', 'c.gif', 'c1.gif', 'd.gif', 'd1.gif'];
            listSenyawa.forEach(s => {
                ekstensi.forEach(e => {
                    const img = new Image();
                    img.src = `smm${s}${e}`;
                    asetPreload.push(img);
                });
            });
        };

        let molekulAktif = '';
        let sedangAnimasi = false;
        let timerAnimasi;

        const container = document.getElementById('popup-container');
        const overlay = document.getElementById('popup-overlay');
        const pbg = document.getElementById('popup-bg');
        const panim = document.getElementById('popup-anim');

        function bukaPopUp(kode) {
            molekulAktif = kode;
            sedangAnimasi = false;
            pbg.src = `smm${kode}info.png`;
            panim.src = `smm${kode}d.gif`;
            overlay.style.display = 'block';
            container.style.display = 'block';
        }

        function tutupPopUp() {
            overlay.style.display = 'none';
            container.style.display = 'none';
            molekulAktif = '';
            clearTimeout(timerAnimasi);
        }

        function aksiGabung() {
            if (!molekulAktif || sedangAnimasi) return;
            sedangAnimasi = true;
            panim.src = `smm${molekulAktif}d1.gif`;
            timerAnimasi = setTimeout(() => {
                panim.src = `smm${molekulAktif}c.gif`;
                sedangAnimasi = false;
            }, 1450); // Durasi 1.5 detik disesuaikan
        }

        function aksiPisah() {
            if (!molekulAktif || sedangAnimasi) return;
            sedangAnimasi = true;
            panim.src = `smm${molekulAktif}c1.gif`;
            timerAnimasi = setTimeout(() => {
                panim.src = `smm${molekulAktif}d.gif`;
                sedangAnimasi = false;
            }, 1450);
        }
    </script>
</body>
</html>
